<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DARKCALC VAULT NEXT</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0b0b;
  color:white;
  transition:0.3s;
}

.app{
  width:390px;
  margin:auto;
  padding:16px;
}

.logo{
  text-align:center;
  font-weight:900;
  letter-spacing:5px;
  margin:10px 0;
}

#screen{
  height:90px;
  background:#111;
  border-radius:16px;
  display:flex;
  justify-content:flex-end;
  align-items:flex-end;
  padding:14px;
  font-size:42px;
  overflow:hidden;
}

.row{
  display:flex;
  gap:8px;
  margin:10px 0;
}

button{
  flex:1;
  height:42px;
  border:none;
  border-radius:10px;
  background:#1f1f1f;
  color:white;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.buttons button{
  height:68px;
  font-size:20px;
  border-radius:16px;
}

.op{
  background:white;
  color:black;
}

/* VAULT */
#vault{
  margin-top:15px;
  background:#151515;
  padding:12px;
  border-radius:12px;
  display:none;
}

input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  margin-top:8px;
}

/* MEDIA */
.media{
  margin-top:10px;
  padding:10px;
  background:#222;
  border-radius:10px;
}

.item{
  display:flex;
  justify-content:space-between;
  margin-top:5px;
  padding:5px;
  background:#333;
  border-radius:6px;
}

/* THEMES */
.light{ background:#eaeaea; color:#111; }
.neon{ background:#001a1a; color:#00ffff; }
</style>
</head>

<body>

<div class="app">

<div class="logo">DARKCALC VAULT</div>

<div id="screen">0</div>

<div class="row">
<button onclick="setMode('basic')">Basic</button>
<button onclick="setMode('science')">Sci</button>
<button onclick="toggleVault()">Vault</button>
</div>

<div class="row">
<button onclick="setTheme('dark')">Dark</button>
<button onclick="setTheme('light')">Light</button>
<button onclick="setTheme('neon')">Neon</button>
</div>

<div class="buttons" id="buttons"></div>

<!-- VAULT -->
<div id="vault">

<h3>🔐 Vault</h3>

<p id="status">Locked</p>

<input id="pin" placeholder="Set / Enter PIN"/>

<div class="row">
<button onclick="setPIN()">Set</button>
<button onclick="unlock()">Unlock</button>
</div>

<input id="mediaInput" placeholder="Add hidden note"/>
<button onclick="addMedia()">Add Hidden Item</button>

<div class="media" id="mediaBox"></div>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
