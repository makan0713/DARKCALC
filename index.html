<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DARKCALC ULTRA</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#050505;
  color:white;
  overflow:hidden;
}

/* 🔥 SPLASH */
#splash{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:999;
  animation: fade 1s ease 2.5s forwards;
}

#splash h1{
  letter-spacing:6px;
  font-size:34px;
}

#splash p{
  opacity:0.6;
}

@keyframes fade{
  to{opacity:0;visibility:hidden;}
}

/* APP */
.app{
  width:390px;
  margin:auto;
  padding:16px;
  padding-top:40px;
}

.logo{
  text-align:center;
  font-weight:900;
  letter-spacing:6px;
  margin-bottom:10px;
}

#screen{
  height:100px;
  background:black;
  border-radius:18px;
  display:flex;
  justify-content:flex-end;
  align-items:flex-end;
  padding:16px;
  font-size:52px;
  margin-bottom:10px;
}

.row{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}

button{
  flex:1;
  height:42px;
  border:none;
  border-radius:12px;
  background:#1f1f1f;
  color:white;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.buttons button{
  height:70px;
  font-size:20px;
  border-radius:18px;
}

button:active{
  transform:scale(0.92);
}

.op{
  background:white;
  color:black;
}

canvas{
  margin-top:10px;
  background:#111;
  border-radius:12px;
  display:none;
  width:100%;
}

.history{
  margin-top:10px;
  max-height:140px;
  overflow:auto;
}

.historyItem{
  background:#1a1a1a;
  padding:8px;
  margin-top:6px;
  border-radius:10px;
  font-size:13px;
}
</style>
</head>

<body>

<!-- 🔥 splash -->
<div id="splash">
  <h1>DARKCALC</h1>
  <p>Ultra Experience</p>
</div>

<div class="app">

<div class="logo">DARKCALC</div>

<div id="screen">0</div>

<div class="row">
<button onclick="setMode('basic')">Basic</button>
<button onclick="setMode('scientific')">Scientific</button>
<button onclick="toggleGraph()">Graph</button>
<button onclick="voiceCalc()">🎤</button>
</div>

<div class="row">
<button onclick="setTheme('dark')">Dark</button>
<button onclick="setTheme('light')">Light</button>
<button onclick="setTheme('neon')">Neon</button>
</div>

<div class="buttons" id="buttons"></div>

<canvas id="graph" width="340" height="160"></canvas>

<div class="history">
<h3>History</h3>
<div id="historyList"></div>
</div>

</div>

<script src="app.js"></script>

<script>
setTimeout(()=>{
  document.getElementById("splash").style.display="none";
},2500);
</script>

</body>
</html>
